# ============================================================================
# Android Release Build & Publish — GitHub Actions (Matrix Pipeline)
# ============================================================================
# Triggers on push to main, alpha, and beta branches.
# Builds a release APK via Gradle, auto-increments the version, creates a
# GitHub Release with changelog, and uploads the APK as a downloadable asset.
#
# Pipeline architecture (3 parallel-ready stages):
#   1. prepare  — checkout, version computation, changelog generation (~1 min)
#   2. build    — npm ci, expo prebuild, Gradle assembleRelease (~12-15 min)
#   3. release  — create git tag, publish GitHub Release with APK (~1 min)
#
# Branch → Release channel mapping:
#   main  → stable release   (v1.0.0, v1.1.0, …)
#   beta  → beta pre-release (v1.1.0-beta.1, v1.1.0-beta.2, …)
#   alpha → alpha pre-release (v1.1.0-alpha.1, v1.1.0-alpha.2, …)
#
# Performance optimizations:
#   - Gradle build-cache enabled for incremental native compilation
#   - Gradle daemon with 4GB heap + parallel task execution
#   - Node modules cached via setup-node
#   - Gradle wrapper & dependencies cached across runs
#   - Disk space freed before build to avoid low-space slowdowns
#   - File-watcher limit raised for Gradle daemon stability
# ============================================================================

name: Android Release

on:
  push:
    branches:
      - main
      - alpha
      - beta

# Only one release workflow per branch at a time
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

# Permissions required to create releases and push tags
permissions:
  contents: write

env:
  JAVA_VERSION: "17"
  NODE_VERSION: "20"
  # ── Gradle performance flags (inherited by every Gradle invocation) ──
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=true
    -Dorg.gradle.parallel=true
    -Dorg.gradle.workers.max=4
    -Dorg.gradle.jvmargs=-Xmx4g -XX:+HeapDumpOnOutOfMemoryError -XX:+UseParallelGC
    -Dorg.gradle.configureondemand=true
    -Dorg.gradle.caching=true
    -Dorg.gradle.vfs.watch=false

jobs:
  # ════════════════════════════════════════════════════════════════════════
  # Stage 1: Prepare — compute version, generate changelog
  # ════════════════════════════════════════════════════════════════════════
  prepare:
    name: Prepare (${{ github.ref_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Skip when commit message contains [skip ci] or [ci skip]
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[ci skip]')

    outputs:
      # Pass computed values to downstream jobs via outputs
      version: ${{ steps.version.outputs.version }}
      base_version: ${{ steps.version.outputs.base_version }}
      build_number: ${{ steps.version.outputs.build_number }}
      apk_name: ${{ steps.version.outputs.apk_name }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      channel: ${{ steps.version.outputs.channel }}
      changelog: ${{ steps.changelog.outputs.body }}

    steps:
      # Full history needed for tag-based changelog and build number
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Compute version string, APK name, and release channel ─────────
      - name: Determine version and release channel
        id: version
        run: |
          # Read base version from app.json (e.g. "1.3.0")
          BASE_VERSION=$(node -p "require('./app.json').expo.version")
          echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"

          BRANCH="${GITHUB_REF_NAME}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          # Count commits since last tag for build number suffix
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            BUILD_NUMBER=$(git rev-list "${LAST_TAG}..HEAD" --count)
          else
            # No tags yet — use total commit count
            BUILD_NUMBER=$(git rev-list HEAD --count)
          fi
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

          # Map branch names to version suffixes and release channels
          if [ "$BRANCH" = "main" ]; then
            VERSION="v${BASE_VERSION}"
            APK_NAME="expense-tracker-v${BASE_VERSION}.apk"
            PRERELEASE="false"
            CHANNEL="stable"
          elif [ "$BRANCH" = "beta" ]; then
            VERSION="v${BASE_VERSION}-beta.${BUILD_NUMBER}"
            APK_NAME="expense-tracker-v${BASE_VERSION}-beta.${BUILD_NUMBER}.apk"
            PRERELEASE="true"
            CHANNEL="beta"
          elif [ "$BRANCH" = "alpha" ]; then
            VERSION="v${BASE_VERSION}-alpha.${BUILD_NUMBER}"
            APK_NAME="expense-tracker-v${BASE_VERSION}-alpha.${BUILD_NUMBER}.apk"
            PRERELEASE="true"
            CHANNEL="alpha"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"

          echo "📦 Version: $VERSION | Channel: $CHANNEL | Build: $BUILD_NUMBER"

      # ── Build categorized changelog from conventional commit messages ──
      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            echo "Generating changelog since $LAST_TAG"
            RANGE="${LAST_TAG}..HEAD"
          else
            echo "No previous tag found — using full commit history"
            RANGE="HEAD"
          fi

          # Categorize commits by conventional-commit prefix
          {
            echo "## What's Changed"
            echo ""

            # Collect feature commits (feat:)
            FEATURES=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^feat" -i 2>/dev/null || true)
            if [ -n "$FEATURES" ]; then
              echo "### ✨ Features"
              echo "$FEATURES"
              echo ""
            fi

            # Collect bug-fix commits (fix:)
            FIXES=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^fix" -i 2>/dev/null || true)
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            # Collect performance commits (perf:)
            PERF=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^perf" -i 2>/dev/null || true)
            if [ -n "$PERF" ]; then
              echo "### ⚡ Performance"
              echo "$PERF"
              echo ""
            fi

            # Collect all other commits not matching the above categories
            OTHER=$(git log "$RANGE" --pretty=format:"- %s (%h)" --invert-grep --grep="^feat" --grep="^fix" --grep="^perf" -i 2>/dev/null || true)
            if [ -n "$OTHER" ]; then
              echo "### 📦 Other Changes"
              echo "$OTHER"
              echo ""
            fi

            echo "---"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${LAST_TAG:-initial}...${{ steps.version.outputs.version }}"
          } > changelog.md

          cat changelog.md

          # Export multiline changelog as step output
          {
            echo "body<<CHANGELOG_EOF"
            cat changelog.md
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

  # ════════════════════════════════════════════════════════════════════════
  # Stage 2: Build — install deps, prebuild, Gradle assemble (heaviest job)
  # ════════════════════════════════════════════════════════════════════════
  build:
    name: Build APK (${{ github.ref_name }})
    runs-on: ubuntu-latest
    needs: prepare
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Parallel-friendly setup: Java + Node with caching ─────────────
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      # ── Cache Gradle wrapper + dependencies across builds ─────────────
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── Free disk space to avoid slow I/O and OOM during native build ─
      - name: Free disk space and tune system
        run: |
          # Raise inotify limit so Gradle file watchers don't hit ceiling
          echo fs.inotify.max_user_watches=524288 | sudo tee -a /etc/sysctl.conf
          sudo sysctl -p
          # Remove unused SDKs/toolchains to free ~8 GB
          sudo rm -rf /usr/local/lib/android/sdk/ndk /usr/share/dotnet /opt/ghc 2>/dev/null || true

      # ── Install JS dependencies (uses npm cache from setup-node) ──────
      - name: Install Node dependencies
        run: npm ci

      # ── Generate native Android project from Expo config ──────────────
      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      # ── Inject version into Android build.gradle ──────────────────────
      - name: Update Android versionCode and versionName
        run: |
          VERSION_NAME="${{ needs.prepare.outputs.base_version }}"
          VERSION_CODE="${{ needs.prepare.outputs.build_number }}"

          # Ensure versionCode is at least 1 (Gradle requires > 0)
          if [ "$VERSION_CODE" -lt 1 ]; then
            VERSION_CODE=1
          fi

          echo "Setting versionName=$VERSION_NAME versionCode=$VERSION_CODE"

          # Patch versionCode and versionName in build.gradle
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"$VERSION_NAME\"/" android/app/build.gradle

      # ── Pre-warm Gradle daemon before the main build ──────────────────
      - name: Pre-warm Gradle daemon
        working-directory: android
        run: ./gradlew --version

      # ── Assemble release APK with all performance flags ───────────────
      - name: Build release APK
        working-directory: android
        run: |
          ./gradlew app:assembleRelease \
            -x lint \
            -x test \
            --parallel \
            --configure-on-demand \
            --build-cache \
            --daemon

      # ── Rename APK to versioned filename and upload as artifact ───────
      - name: Rename and upload APK
        run: |
          APK_SRC="android/app/build/outputs/apk/release/app-release.apk"
          APK_DEST="${{ needs.prepare.outputs.apk_name }}"

          # Copy APK with the versioned name
          cp "$APK_SRC" "$APK_DEST"

          APK_SIZE=$(du -h "$APK_DEST" | cut -f1)
          echo "📦 APK: $APK_DEST ($APK_SIZE)"

      # Upload APK as build artifact so the release job can download it
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: ${{ needs.prepare.outputs.apk_name }}
          retention-days: 1

  # ════════════════════════════════════════════════════════════════════════
  # Stage 3: Release — tag, create GitHub Release, attach APK
  # ════════════════════════════════════════════════════════════════════════
  release:
    name: Publish Release (${{ github.ref_name }})
    runs-on: ubuntu-latest
    needs: [prepare, build]
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Download the APK built in the previous stage
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: release-apk

      # ── Create and push a Git tag for this release ────────────────────
      - name: Create and push tag
        run: |
          TAG="${{ needs.prepare.outputs.version }}"

          # Skip if tag already exists (e.g. re-run on same commit)
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "⚠️  Tag $TAG already exists, skipping tag creation"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
            echo "✅ Created and pushed tag $TAG"
          fi

      # ── Publish GitHub Release with APK as downloadable asset ─────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: "${{ needs.prepare.outputs.version }}"
          body: ${{ needs.prepare.outputs.changelog }}
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          draft: false
          generate_release_notes: false
          files: |
            ${{ needs.prepare.outputs.apk_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Log release summary ───────────────────────────────────────────
      - name: Release summary
        run: |
          echo "============================================"
          echo "🚀 Release Published!"
          echo "============================================"
          echo "Version  : ${{ needs.prepare.outputs.version }}"
          echo "Channel  : ${{ needs.prepare.outputs.channel }}"
          echo "APK      : ${{ needs.prepare.outputs.apk_name }}"
          echo "Pre-rel  : ${{ needs.prepare.outputs.prerelease }}"
          echo "Release  : https://github.com/${{ github.repository }}/releases/tag/${{ needs.prepare.outputs.version }}"
          echo "============================================"
